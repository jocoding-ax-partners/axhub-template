version: axhub/v1
name: vite-react-axhub
runtime:
  port: 80
  health_path: /
build:
  strategy: auto
  framework: vite
  dockerfile: Dockerfile
  deploy_method: docker
env:
  optional:
    - name: VITE_APPHUB_API_URL
      scope: build
    - name: VITE_APPHUB_APP_SLUG
      scope: build
    - name: VITE_APPHUB_TENANT
      scope: build
    - name: VITE_APPHUB_APP_ORIGIN
      scope: build
